<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Patient</h2>

    <form action="/update/{{ patient.id }}" method="POST">

        <input type="text" name="full_name" class="form-control mb-3"
        value="{{ patient.full_name }}" required>

        <input type="date" name="dob" class="form-control mb-3"
        value="{{ patient.dob }}" required>

        <input type="email" name="email" class="form-control mb-3"
        value="{{ patient.email }}" required>

        <input type="number" step="0.01" name="glucose"
        class="form-control mb-3"
        value="{{ patient.glucose }}" required>

        <input type="number" step="0.01" name="haemoglobin"
        class="form-control mb-3"
        value="{{ patient.haemoglobin }}" required>

        <input type="number" step="0.01" name="cholesterol"
        class="form-control mb-3"
        value="{{ patient.cholesterol }}" required>

        <button class="btn btn-primary">
            Update Patient
        </button>

    </form>

</div>

</body>
</html>
