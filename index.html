<!DOCTYPE html>

<html>

<head>

<title>Health Prediction App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="container mt-5">

<h2>🩺 AI Health Prediction Dashboard</h2>

<p>
Track patient health records and risk predictions
</p>

<form action="/add" method="POST">

<input class="form-control mt-2" name="full_name" placeholder="Full Name" required>

<input class="form-control mt-2" type="date" name="dob" required>

<input class="form-control mt-2" type="email" name="email" placeholder="Email" required>

<input class="form-control mt-2" type="number" step="0.1" name="glucose" placeholder="Glucose" required>

<input class="form-control mt-2" type="number" step="0.1" name="haemoglobin" placeholder="Haemoglobin" required>

<input class="form-control mt-2" type="number" step="0.1" name="cholesterol" placeholder="Cholesterol" required>

<button class="btn btn-primary mt-3">
Save
</button>

</form>

<hr>

<table class="table">

<tr>

<th>Name</th>
<th>Email</th>
<th>Glucose</th>
<th>Remarks</th>
<th>Actions</th>

</tr>

{% for patient in patients %}

<tr>

<td>{{patient.full_name}}</td>

<td>{{patient.email}}</td>

<td>{{patient.glucose}}</td>

<td>{{patient.remarks}}</td>

<td>

<a href="/edit/{{patient.id}}" class="btn btn-warning btn-sm">

Edit

</a>

<a href="/delete/{{patient.id}}" class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
