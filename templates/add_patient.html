<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% with messages = get_flashed_messages() %}
{% if messages %}
<div class="container mt-5">

    <div class="card p-5 shadow-lg">

        <h1 class="text-center mb-4">
            🩺 Add New Patient
        </h1>
        <p class="text-center text-muted">
    Enter patient details to generate AI-powered health insights.
</p>

<div class="alert alert-success">
    {{ messages[0] }}
</div>

{% endif %}
{% endwith %}
 <form action="/add" method="POST">

<input class="form-control mt-2" name="full_name" placeholder="Full Name" required>

<label class="form-label"></label>
<input class="form-control mt-2" type="date" name="dob" required>
<small class="text-muted">Please select patient birth date</small>

<input class="form-control mt-2" type="email" name="email" placeholder="Email" required>

<input class="form-control mt-2" type="number" step="0.1" name="glucose" placeholder="Glucose" required>

<input class="form-control mt-2" type="number" step="0.1" name="haemoglobin" placeholder="Haemoglobin" required>

<input class="form-control mt-2" type="number" step="0.1" name="cholesterol" placeholder="Cholesterol" required>

<button class="btn btn-primary mt-4">
  Generate AI Health Report
</button>

</form>
    </div>
</div>

</body>
</html>
